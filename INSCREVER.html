<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Inscrições</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .header {
            background-color: #28a745;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .header h2 {
            margin-bottom: 5px;
            font-size: 18px;
        }
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        .alerta-encerrado {
            background-color: #dc3545;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
        .alerta-reiniciando {
            background-color: #ffc107;
            color: #212529;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
        .lista {
            padding: 20px;
        }
        .item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid #eee;
            flex-wrap: wrap;
            gap: 10px;
        }
        .info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .foto {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid #ccc;
        }
        .dados h4 {
            font-size: 15px;
            color: #333;
            margin-bottom: 2px;
        }
        .dados p {
            font-size: 12px;
            color: #666;
        }
        .btn-confirmar {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
        }
        .btn-confirmar:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
        }
        .confirmado {
            color: #28a745;
            font-weight: bold;
            padding: 8px 16px;
        }
        .limite {
            color: #dc3545;
            font-weight: bold;
            text-align: center;
            padding: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>📋 Lista de Confirmações</h2>
            <p>Confirme sua presença na lista abaixo</p>
        </div>

        <div class="alerta-reiniciando" id="avisoReiniciando">
            ⏰ REINICIANDO SISTEMA... AGUARDE!
        </div>

        <div class="alerta-encerrado" id="avisoEncerrado">
            ⚠️ AS INSCRIÇÕES ESTÃO ENCERRADAS
        </div>

        <div class="lista" id="listaPessoas"></div>
        <div class="limite" id="avisoLimite">⚠️ Limite de 16 confirmações atingido</div>
    </div>

    <script>
        // ✅ Configuração do Firebase (SEU DADOS)
        var firebaseConfig = {
          apiKey: "AIzaSyAR--VWkuPUBzKtJlEHPXnwBwbapB8JY_w",
          authDomain: "sistema-inscricoes-e9241.firebaseapp.com",
          databaseURL: "https://sistema-inscricoes-e9241-default-rtdb.firebaseio.com",
          projectId: "sistema-inscricoes-e9241",
          storageBucket: "sistema-inscricoes-e9241.firebasestorage.app",
          messagingSenderId: "232618438422",
          appId: "1:232618438422:web:1c62103b2169e64e862a37"
        };

        firebase.initializeApp(firebaseConfig);
        var db = firebase.database();
        const LIMITE_MAXIMO = 16;

        // ✅ FUNÇÃO DE REINÍCIO AUTOMÁTICO (GRATUITA)
        async function verificarEExecutarReinicio() {
            const snap = await db.ref('agendamento_reinicio').once('value');
            const agendado = snap.val();

            if (!agendado || agendado.executado === true) return;

            const agora = Date.now();
            if (agora >= agendado.timestamp) {
                document.getElementById('avisoReiniciando').style.display = 'block';

                // Reinicia tudo
                const dados = await db.ref('inscricoes').once('value');
                const lista = dados.val() || [];

                const novaLista = lista.map(p => {
                    if (p) {
                        p.status = 'pendente';
                        p.data_confirmacao = null;
                    }
                    return p;
                });

                await db.ref('inscricoes').set(novaLista);
                await db.ref('configuracao').update({inscricoes_abertas: true});
                await db.ref('agendamento_reinicio').update({executado: true});

                location.reload();
            }
        }
        verificarEExecutarReinicio();

        // ✅ Função de Confirmar Presença
        function confirmar(id) {
            db.ref('configuracao').once('value').then(snapConf => {
                const conf = snapConf.val();
                if (!conf || conf.inscricoes_abertas === false) {
                    alert('Inscrições encerradas!');
                    return;
                }

                db.ref('inscricoes').once('value').then(snap => {
                    let lista = snap.val() || [];
                    let qtd = lista.filter(i => i && i.status === 'confirmado').length;

                    if (qtd >= LIMITE_MAXIMO) {
                        alert('Limite atingido!');
                        return;
                    }

                    lista = lista.map(p => {
                        if (p && p.id === id && p.status === 'pendente') {
                            p.status = 'confirmado';
                            p.data_confirmacao = Date.now();
                        }
                        return p;
                    });

                    db.ref('inscricoes').set(lista);
                });
            });
        }

        // ✅ Carregar e exibir lista (MODELO ORIGINAL)
        function carregar() {
            db.ref('inscricoes').on('value', snap => {
                const lista = snap.val() || [];
                const container = document.getElementById('listaPessoas');
                const avisoEncerrado = document.getElementById('avisoEncerrado');
                const avisoLimite = document.getElementById('avisoLimite');
                let qtdConfirmados = lista.filter(i => i && i.status === 'confirmado').length;

                db.ref('configuracao').once('value').then(snapConf => {
                    const conf = snapConf.val();
                    
                    if (conf && conf.inscricoes_abertas === false) {
                        avisoEncerrado.style.display = 'block';
                        avisoLimite.style.display = 'none';
                    } else {
                        avisoEncerrado.style.display = 'none';
                        avisoLimite.style.display = qtdConfirmados >= LIMITE_MAXIMO ? 'block' : 'none';
                    }

                    if (lista.length === 0) {
                        container.innerHTML = '<p style="padding:20px;text-align:center;color:#888;">Nenhuma pessoa cadastrada.</p>';
                        return;
                    }

                    // Ordenação original
                    let ordenado = lista.filter(Boolean).sort((a, b) => {
                        if (a.status === 'pendente' && b.status === 'confirmado') return -1;
                        if (a.status === 'confirmado' && b.status === 'pendente') return 1;
                        return a.nome.localeCompare(b.nome);
                    });

                    container.innerHTML = '';
                    ordenado.forEach(pessoa => {
                        let acao = '';
                        if (pessoa.status === 'pendente') {
                            acao = `<button class="btn-confirmar" onclick="confirmar(${pessoa.id})">Confirmar</button>`;
                        } else {
                            acao = `<span class="confirmado">Confirmado ✅</span>`;
                        }

                        let foto = pessoa.foto ? `<img src="${pessoa.foto}" class="foto">` : '<div class="foto" style="display:flex;align-items:center;justify-content:center;background:#eee;">📷</div>';

                        const item = document.createElement('div');
                        item.className = 'item';
                        item.innerHTML = `
                            <div class="info">
                                ${foto}
                                <div class="dados">
                                    <h4>${pessoa.nome}</h4>
                                    <p>Nascimento: ${pessoa.dia}/${pessoa.mes}</p>
                                </div>
                            </div>
                            ${acao}
                        `;
                        container.appendChild(item);
                    });
                });
            });
        }

        carregar();
    </script>
</body>
</html>
