<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscreva-se - Sistema de Inscrições</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase.js"></script>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif;}
        body {background-color: #343a40; padding: 20px; min-height: 100vh; display: flex; align-items: center; justify-content: center;}

        .container {
            background: white;
            padding: 30px 25px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {color: #2c3e50; margin-bottom: 8px; font-size: 22px;}
        .subtitulo {color: #666; margin-bottom: 20px; font-size: 14px;}

        .aviso-fechado {
            background: #fff3cd;
            color: #856404;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
            display: none;
        }

        .grupo-campo {margin-bottom: 15px; text-align: left;}
        label {display: block; margin-bottom: 5px; font-weight: 500; color: #555;}
        
        input {
            width: 100%;
            padding: 12px 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }

        .grupo-data {
            display: flex;
            gap: 10px;
        }
        .grupo-data div {flex: 1;}

        /* ✅ Deixa as caixinhas de dia e mês menores e alinhadas */
        .grupo-data input {
            text-align: center;
        }

        input[type="file"] {
            padding: 8px;
            border: 1px dashed #27ae60;
            background: #f8f9fa;
        }

        .foto-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ddd;
            margin: 10px auto;
            display: none;
        }

        button {
            width: 100%;
            padding: 13px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        button:hover {background-color: #219653;}
        button:disabled {background: #95a5a6; cursor: not-allowed;}

        .mensagem {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            display: none;
        }
        .sucesso {background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb;}
        .erro {background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;}

        .carregando {color: #3498db; font-style: italic; display: none; margin-top: 10px;}
    </style>
</head>
<body>

    <div class="container">
        <h1>📋 Faça sua Inscrição</h1>
        <p class="subtitulo">Preencha os dados corretamente para participar</p>

        <div id="avisoFechado" class="aviso-fechado">⚠️ As inscrições estão encerradas no momento.</div>

        <form id="formInscricao">
            <div class="grupo-campo">
                <label>Nome Completo:</label>
                <input type="text" id="nome" placeholder="Digite seu nome completo" required>
            </div>

            <div class="grupo-campo">
                <label>Data de Nascimento:</label>
                <div class="grupo-data">
                    <div>
                        <label style="font-size: 13px; text-align:center; display:block;">Dia</label>
                        <!-- ✅ Adicionei o evento oninput para pular automaticamente -->
                        <input type="number" id="dia" min="1" max="31" placeholder="DD" required maxlength="2" oninput="pularParaMes(this)">
                    </div>
                    <div>
                        <label style="font-size: 13px; text-align:center; display:block;">Mês</label>
                        <input type="number" id="mes" min="1" max="12" placeholder="MM" required maxlength="2">
                    </div>
                </div>
            </div>

            <div class="grupo-campo">
                <label>📸 Foto de Perfil (opcional):</label>
                <input type="file" id="foto" accept="image/*" onchange="mostrarPreview(this)">
                <img id="previewFoto" class="foto-preview" alt="Pré-visualização">
            </div>

            <button type="submit" id="botaoEnviar">✅ Confirmar Inscrição</button>
        </form>

        <div id="carregando" class="carregando">Enviando dados...</div>
        <div id="mensagem" class="mensagem"></div>
    </div>

    <script>
        // ✅ SEUS DADOS DO FIREBASE
        var firebaseConfig = {
          apiKey: "AIzaSyAR--VWkuPUBzKtJlEHPXnwBwbapB8JY_w",
          authDomain: "sistema-inscricoes-e9241.firebaseapp.com",
          databaseURL: "https://sistema-inscricoes-e9241-default-rtdb.firebaseio.com",
          projectId: "sistema-inscricoes-e9241",
          storageBucket: "sistema-inscricoes-e9241.firebasestorage.app",
          messagingSenderId: "232618438422",
          appId: "1:232618438422:web:1c62103b2169e64e862a37"
        };

        firebase.initializeApp(firebaseConfig);
        var db = firebase.database();
        const LIMITE_MAXIMO = 16;

        // ✅ FUNÇÃO PULAR PARA O MÊS AO DIGITAR 2 NÚMEROS NO DIA
        function pularParaMes(campo) {
            // Se já tiver 2 dígitos, pula para o campo do mês
            if (campo.value.length >= 2) {
                document.getElementById('mes').focus();
            }
        }

        function mostrarPreview(input) {
            if (input.files && input.files[0]) {
                var leitor = new FileReader();
                leitor.onload = function(e) {
                    var img = document.getElementById('previewFoto');
                    img.src = e.target.result;
                    img.style.display = 'block';
                }
                leitor.readAsDataURL(input.files[0]);
            }
        }

        function lerFotoComoTexto(arquivo, callback) {
            if (!arquivo) { callback(null); return; }
            var leitor = new FileReader();
            leitor.onload = function(e) {
                var img = new Image();
                img.onload = function() {
                    var canvas = document.createElement('canvas');
                    var tamanho = 100;
                    canvas.width = tamanho;
                    canvas.height = tamanho;
                    var ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, tamanho, tamanho);
                    callback(canvas.toDataURL('image/jpeg', 0.7));
                };
                img.src = e.target.result;
            };
            leitor.readAsDataURL(arquivo);
        }

        function verificarEstadoInscricoes() {
            return new Promise((resolve) => {
                db.ref('configuracao').once('value').then(snap => {
                    const config = snap.val() || {};
                    db.ref('inscricoes').once('value').then(snapInsc => {
                        const lista = snapInsc.val() || [];
                        const qtdConfirmados = lista.filter(i => i && i.status === 'confirmado').length;
                        const abertas = config.inscricoes_abertas !== false && qtdConfirmados < LIMITE_MAXIMO;
                        resolve(abertas);
                    });
                });
            });
        }

        document.getElementById('formInscricao').addEventListener('submit', function(e) {
            e.preventDefault();

            verificarEstadoInscricoes().then(abertas => {
                if (!abertas) {
                    document.getElementById('avisoFechado').style.display = 'block';
                    return;
                }

                document.getElementById('carregando').style.display = 'block';
                document.getElementById('mensagem').style.display = 'none';
                document.getElementById('botaoEnviar').disabled = true;

                var nome = document.getElementById('nome').value.trim();
                var dia = parseInt(document.getElementById('dia').value);
                var mes = parseInt(document.getElementById('mes').value);
                var arquivoFoto = document.getElementById('foto').files[0];

                if (!nome || !dia || !mes || dia < 1 || dia > 31 || mes < 1 || mes > 12) {
                    mostrarMensagem('❌ Preencha todos os dados corretamente!', 'erro');
                    return;
                }

                lerFotoComoTexto(arquivoFoto, function(textoDaFoto) {
                    db.ref('inscricoes').once('value').then(snap => {
                        var inscricoes = snap.val() || [];
                        var novoId = inscricoes.length > 0 ? Math.max(...inscricoes.map(i => i.id)) + 1 : 1;
                        
                        inscricoes.push({
                            id: novoId,
                            nome: nome,
                            dia: dia,
                            mes: mes,
                            status: 'pendente',
                            foto: textoDaFoto || "",
                            data_confirmacao: null
                        });
                        
                        return db.ref('inscricoes').set(inscricoes);
                    }).then(() => {
                        mostrarMensagem('✅ Inscrição realizada com sucesso! Aguarde confirmação.', 'sucesso');
                        document.getElementById('formInscricao').reset();
                        document.getElementById('previewFoto').style.display = 'none';
                    }).catch(() => {
                        mostrarMensagem('❌ Erro ao enviar dados. Tente novamente.', 'erro');
                    });
                });
            });
        });

        function mostrarMensagem(texto, tipo) {
            document.getElementById('carregando').style.display = 'none';
            const msg = document.getElementById('mensagem');
            msg.innerText = texto;
            msg.className = `mensagem ${tipo}`;
            msg.style.display = 'block';
            document.getElementById('botaoEnviar').disabled = false;
        }

        // Verifica se está fechado ao carregar
        verificarEstadoInscricoes().then(abertas => {
            if (!abertas) document.getElementById('avisoFechado').style.display = 'block';
        });
    </script>

</body>
</html>
