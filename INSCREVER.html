<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUP EDITION - Inscrição</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #343a40;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        /* ✅ AUMENTADO MAIS O TAMANHO DO TÍTULO */
        h1 {
            color: #2c3e50;
            font-size: 32px; /* Antes era 28px, agora maior */
            margin-bottom: 20px;
            font-weight: bold;
        }
        /* ✅ TEXTO ALTERADO E TAMANHO MANTIDO */
        h2 {
            color: #27ae60;
            font-size: 24px; /* Mesmo tamanho de antes */
            margin-bottom: 25px;
            font-weight: bold;
        }
        .aviso-fechado {
            background-color: #f8d7da;
            color: #721c24;
            border: 2px solid #e74c3c;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 20px;
            display: none;
        }
        .grupo-campo {
            margin-bottom: 15px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #555;
            font-size: 15px;
        }
        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
        }
        input[type="number"] {
            width: 100%;
        }
        input[type="file"] {
            padding: 8px;
            font-size: 14px;
            border: 1px dashed #27ae60;
            background: #f8f9fa;
        }
        .foto-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ddd;
            margin: 10px auto;
            display: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #219653;
        }
        button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }
        .mensagem {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            display: none;
        }
        .sucesso {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .erro {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ✅ TEXTO MAIOR -->
        <h1>🏆 CUP EDITION 🏆</h1>
        
        <!-- ✅ TEXTO ALTERADO, TAMANHO IGUAL -->
        <h2>📝INSCREVA-SE📝</h2>

        <div id="avisoFechado" class="aviso-fechado">
            ⚠️ INSCRIÇÕES ENCERRADAS! LIMITE DE VAGAS ATINGIDO.
        </div>

        <form id="formInscricao">
            <div class="grupo-campo">
                <label>Nome Completo:</label>
                <input type="text" id="nome" placeholder="Digite seu nome completo" required>
            </div>

            <div class="grupo-campo">
                <label>Data de Nascimento:</label>
                <div style="display: flex; gap: 10px;">
                    <div style="flex: 1;">
                        <label style="font-size: 13px; margin-bottom: 3px;">Dia</label>
                        <input type="number" id="dia" min="1" max="31" placeholder="Dia" required>
                    </div>
                    <div style="flex: 1;">
                        <label style="font-size: 13px; margin-bottom: 3px;">Mês</label>
                        <input type="number" id="mes" min="1" max="12" placeholder="Mês" required>
                    </div>
                </div>
            </div>

            <div class="grupo-campo">
                <label>📸 Foto de Perfil (opcional):</label>
                <input type="file" id="foto" accept="image/*" onchange="mostrarPreview(this)">
                <img id="previewFoto" class="foto-preview" alt="Pré-visualização">
            </div>

            <button type="submit" id="botaoEnviar">Confirmar Inscrição</button>
        </form>

        <div id="mensagem" class="mensagem"></div>
    </div>

    <script>
        // ✅ SEUS DADOS DO FIREBASE
        var firebaseConfig = {
          apiKey: "AIzaSyAR--VWkuPUBzKtJlEHPXnwBwbapB8JY_w",
          authDomain: "sistema-inscricoes-e9241.firebaseapp.com",
          databaseURL: "https://sistema-inscricoes-e9241-default-rtdb.firebaseio.com",
          projectId: "sistema-inscricoes-e9241",
          storageBucket: "sistema-inscricoes-e9241.firebasestorage.app",
          messagingSenderId: "232618438422",
          appId: "1:232618438422:web:1c62103b2169e64e862a37"
        };

        firebase.initializeApp(firebaseConfig);
        var db = firebase.database();
        const LIMITE_MAXIMO = 16;

        // ✅ MOSTRAR PRÉ-VISUALIZAÇÃO DA FOTO
        function mostrarPreview(input) {
            if (input.files && input.files[0]) {
                var leitor = new FileReader();
                leitor.onload = function(e) {
                    var img = document.getElementById('previewFoto');
                    img.src = e.target.result;
                    img.style.display = 'block';
                }
                leitor.readAsDataURL(input.files[0]);
            }
        }

        // ✅ CONVERTER FOTO PARA TEXTO (QUALIDADE ALTA)
        function lerFotoComoTexto(arquivo, callback) {
            if (!arquivo) { callback(null); return; }
            var leitor = new FileReader();
            leitor.onload = function(e) {
                var img = new Image();
                img.onload = function() {
                    var canvas = document.createElement('canvas');
                    var tamanho = 300;
                    canvas.width = tamanho;
                    canvas.height = tamanho;
                    var ctx = canvas.getContext('2d');
                    
                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';
                    
                    const tamanhoOriginal = Math.min(img.width, img.height);
                    const xInicio = (img.width - tamanhoOriginal) / 2;
                    const yInicio = (img.height - tamanhoOriginal) / 2;
                    
                    ctx.drawImage(img, xInicio, yInicio, tamanhoOriginal, tamanhoOriginal, 0, 0, tamanho, tamanho);
                    
                    callback(canvas.toDataURL('image/jpeg', 0.9));
                };
                img.src = e.target.result;
            };
            leitor.readAsDataURL(arquivo);
        }

        // ✅ VERIFICAR SE AS INSCRIÇÕES ESTÃO ABERTAS
        function verificarStatusInscricoes() {
            db.ref('configuracao/inscricoes_abertas').on('value', snap => {
                var abertas = snap.val();
                var aviso = document.getElementById('avisoFechado');
                var botao = document.getElementById('botaoEnviar');

                if (abertas === false) {
                    aviso.style.display = 'block';
                    botao.disabled = true;
                } else {
                    aviso.style.display = 'none';
                    botao.disabled = false;
                }
            });
        }

        // ✅ AO ENVIAR O FORMULÁRIO
        document.getElementById('formInscricao').addEventListener('submit', function(e) {
            e.preventDefault();

            var nome = document.getElementById('nome').value.trim();
            var dia = parseInt(document.getElementById('dia').value);
            var mes = parseInt(document.getElementById('mes').value);
            var arquivoFoto = document.getElementById('foto').files[0];
            var mensagem = document.getElementById('mensagem');

            if (!nome || !dia || !mes || dia < 1 || dia > 31 || mes < 1 || mes > 12) {
                mensagem.className = 'mensagem erro';
                mensagem.innerText = '❌ Preencha todos os dados corretamente!';
                mensagem.style.display = 'block';
                return;
            }

            mensagem.className = 'mensagem info';
            mensagem.innerText = '⏳ Enviando inscrição...';
            mensagem.style.display = 'block';

            lerFotoComoTexto(arquivoFoto, function(textoDaFoto) {
                db.ref('inscricoes').once('value').then(snap => {
                    var inscricoes = snap.val() || [];
                    var qtdConfirmados = inscricoes.filter(i => i && i.status === 'confirmado').length;

                    if (qtdConfirmados >= LIMITE_MAXIMO) {
                        mensagem.className = 'mensagem erro';
                        mensagem.innerText = '❌ LIMITE DE VAGAS ATINGIDO! Inscrições encerradas.';
                        mensagem.style.display = 'block';
                        db.ref('configuracao').set({inscricoes_abertas: false});
                        return;
                    }

                    var novoId = inscricoes.length > 0 ? Math.max(...inscricoes.map(i => i.id)) + 1 : 1;
                    
                    inscricoes.push({
                        id: novoId,
                        nome: nome,
                        dia: dia,
                        mes: mes,
                        status: 'confirmado',
                        foto: textoDaFoto || "",
                        data_confirmacao: Date.now()
                    });

                    db.ref('inscricoes').set(inscricoes).then(() => {
                        mensagem.className = 'mensagem sucesso';
                        mensagem.innerText = '✅ INSCRIÇÃO CONFIRMADA COM SUCESSO!';
                        mensagem.style.display = 'block';
                        document.getElementById('formInscricao').reset();
                        document.getElementById('previewFoto').style.display = 'none';
                    });
                });
            });
        });

        // ✅ INICIAR VERIFICAÇÃO
        verificarStatusInscricoes();
    </script>
</body>
</html>
