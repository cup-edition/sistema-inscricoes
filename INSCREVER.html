<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição - Cup Edition Campim FC</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background-color: #f0f4f8;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 20px;
            font-size: 22px;
        }

        .status-sistema {
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 20px;
            border: 2px solid;
        }
        .aberto {
            background-color: #d4edda;
            color: #155724;
            border-color: #27ae60;
        }
        .fechado {
            background-color: #f8d7da;
            color: #721c24;
            border-color: #e74c3c;
        }

        .formulario {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .grupo-campo {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #333;
            font-size: 15px;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 15px;
            color: #495057;
        }

        input[type="number"] {
            width: 48%;
            display: inline-block;
        }

        button {
            width: 100%;
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }

        button:hover {
            background-color: #219653;
        }

        button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }

        .mensagem {
            margin-top: 15px;
            padding: 12px;
            border-radius: 4px;
            font-weight: bold;
            text-align: center;
            display: none;
            font-size: 14px;
        }

        .sucesso {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .erro {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .aviso-limite {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
            display: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>📋 Sistema de Inscrições</h1>

    <div id="statusSistema" class="status-sistema"></div>
    <div id="avisoLimite" class="aviso-limite">⚠️ LIMITE DE 16 CONFIRMADOS ATINGIDO! INSCRIÇÕES ENCERRADAS.</div>

    <div class="formulario">
        <div class="grupo-campo">
            <label>Nome Completo:</label>
            <input type="text" id="nome" placeholder="Digite seu nome completo" required>
        </div>

        <div class="grupo-campo">
            <label>Data de Nascimento:</label>
            <input type="number" id="dia" min="1" max="31" placeholder="Dia" required>
            <input type="number" id="mes" min="1" max="12" placeholder="Mês" required>
        </div>

        <button id="btnInscrever" onclick="fazerInscricao()">📝 Inscrever-se</button>
        <button id="btnConfirmar" onclick="confirmarPresenca()" style="background-color: #f39c12; display: none;">✅ Confirmar Presença</button>

        <div id="mensagem" class="mensagem"></div>
    </div>

    <script>
        // 👇 COLE AQUI SEU CÓDIGO DO FIREBASE 👇
        var firebaseConfig = {
          // COLE SEU CÓDIGO AQUI MESMO
          apiKey: "AIzaSyAR--VWkuPUBzKtJlEHPXnwBwbapB8JY_w",
  authDomain: "sistema-inscricoes-e9241.firebaseapp.com",
  databaseURL: "https://sistema-inscricoes-e9241-default-rtdb.firebaseio.com",
  projectId: "sistema-inscricoes-e9241",
  storageBucket: "sistema-inscricoes-e9241.firebasestorage.app",
  messagingSenderId: "232618438422",
  appId: "1:232618438422:web:1c62103b2169e64e862a37"
};
        // 👆 FIM DO CÓDIGO 👆

        firebase.initializeApp(firebaseConfig);
        var db = firebase.database();
        const LIMITE_MAXIMO = 16;
        let inscricaoEncontrada = null;

        // Verifica status e limite ao carregar
        window.onload = function() {
            verificarStatusSistema();
            verificarLimiteConfirmados();
        };

        function verificarStatusSistema() {
            db.ref('configuracao').on('value', snap => {
                let abertas = snap.val()?.inscricoes_abertas ?? true;
                const statusEl = document.getElementById('statusSistema');
                const btnInscrever = document.getElementById('btnInscrever');
                const btnConfirmar = document.getElementById('btnConfirmar');

                if (abertas) {
                    statusEl.className = 'status-sistema aberto';
                    statusEl.innerText = '✅ INSCRIÇÕES ABERTAS';
                    btnInscrever.disabled = false;
                } else {
                    statusEl.className = 'status-sistema fechado';
                    statusEl.innerText = '❌ INSCRIÇÕES ENCERRADAS';
                    btnInscrever.disabled = true;
                    // Se já estiver inscrito, ainda pode confirmar
                    if (inscricaoEncontrada) {
                        btnInscrever.style.display = 'none';
                        btnConfirmar.style.display = 'block';
                    }
                }
            });
        }

        function verificarLimiteConfirmados() {
            db.ref('inscricoes').on('value', snap => {
                const lista = snap.val() || [];
                const qtdConfirmados = lista.filter(i => i?.status === 'confirmado').length;
                const avisoEl = document.getElementById('avisoLimite');

                if (qtdConfirmados >= LIMITE_MAXIMO) {
                    avisoEl.style.display = 'block';
                    // Fecha inscrições automaticamente
                    db.ref('configuracao').set({inscricoes_abertas: false});
                } else {
                    avisoEl.style.display = 'none';
                }
            });
        }

        function mostrarMensagem(texto, tipo) {
            const el = document.getElementById('mensagem');
            el.innerText = texto;
            el.className = `mensagem ${tipo}`;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        function dadosPreenchidos() {
            const nome = document.getElementById('nome').value.trim();
            const dia = parseInt(document.getElementById('dia').value);
            const mes = parseInt(document.getElementById('mes').value);

            if (!nome || !dia || !mes || dia < 1 || dia > 31 || mes < 1 || mes > 12) {
                mostrarMensagem('❌ Preencha todos os dados corretamente!', 'erro');
                return null;
            }
            return { nome, dia, mes };
        }

        function fazerInscricao() {
            const dados = dadosPreenchidos();
            if (!dados) return;

            db.ref('inscricoes').once('value').then(snap => {
                let lista = snap.val() || [];

                // Verifica se já existe
                const existente = lista.find(i => 
                    i && i.nome.toLowerCase() === dados.nome.toLowerCase() && i.dia === dados.dia && i.mes === dados.mes
                );

                if (existente) {
                    inscricaoEncontrada = existente;
                    document.getElementById('btnInscrever').style.display = 'none';
                    document.getElementById('btnConfirmar').style.display = 'block';
                    mostrarMensagem('📋 Você já está inscrito! Clique em CONFIRMAR PRESENÇA.', 'sucesso');
                    return;
                }

                // Cria nova inscrição
                const novoId = lista.length > 0 ? Math.max(...lista.map(i => i.id)) + 1 : 1;
                lista.push({
                    id: novoId,
                    nome: dados.nome,
                    dia: dados.dia,
                    mes: dados.mes,
                    status: 'pendente'
                });

                db.ref('inscricoes').set(lista).then(() => {
                    inscricaoEncontrada = lista[lista.length - 1];
                    document.getElementById('btnInscrever').style.display = 'none';
                    document.getElementById('btnConfirmar').style.display = 'block';
                    mostrarMensagem('✅ Inscrição realizada com sucesso! Agora confirme sua presença.', 'sucesso');
                });
            });
        }

        function confirmarPresenca() {
            if (!inscricaoEncontrada) {
                mostrarMensagem('❌ Faça sua inscrição primeiro!', 'erro');
                return;
            }

            db.ref('inscricoes').once('value').then(snap => {
                let lista = snap.val() || [];
                const index = lista.findIndex(i => i && i.id === inscricaoEncontrada.id);

                if (index !== -1) {
                    lista[index].status = 'confirmado';
                    db.ref('inscricoes').set(lista).then(() => {
                        mostrarMensagem('🎉 Presença confirmada com sucesso! Obrigado.', 'sucesso');
                        document.getElementById('btnConfirmar').disabled = true;
                        document.getElementById('btnConfirmar').innerText = '✅ Confirmado';
                    });
                }
            });
        }
    </script>

</body>
</html>
