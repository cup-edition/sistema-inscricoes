<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TESTE DE CARREGAMENTO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase.js"></script>
    <style>
        body {font-family: Arial; padding: 20px; background: #343a40; color: white;}
        .caixa {background: white; color: black; padding: 20px; border-radius: 8px; max-width: 600px; margin: 0 auto;}
        .erro {color: red; font-weight: bold;}
        .sucesso {color: green; font-weight: bold;}
    </style>
</head>
<body>

    <div class="caixa">
        <h2>🔍 TESTE DE CONEXÃO E CARREGAMENTO</h2>
        <hr>
        <p>Status: <span id="status">Conectando...</span></p>
        <p>Quantidade de dados: <span id="qtd">---</span></p>
        <div id="lista"></div>
    </div>

    <script>
        // SEUS DADOS DO FIREBASE
        var firebaseConfig = {
          apiKey: "AIzaSyAR--VWkuPUBzKtJlEHPXnwBwbapB8JY_w",
          authDomain: "sistema-inscricoes-e9241.firebaseapp.com",
          databaseURL: "https://sistema-inscricoes-e9241-default-rtdb.firebaseio.com",
          projectId: "sistema-inscricoes-e9241",
          storageBucket: "sistema-inscricoes-e9241.firebasestorage.app",
          messagingSenderId: "232618438422",
          appId: "1:232618438422:web:1c62103b2169e64e862a37"
        };

        try {
            firebase.initializeApp(firebaseConfig);
            var db = firebase.database();
            document.getElementById('status').className = 'sucesso';
            document.getElementById('status').innerText = '✅ Conectado ao Firebase!';

            // TENTA CARREGAR OS DADOS
            db.ref('inscricoes').once('value')
            .then(snapshot => {
                const dados = snapshot.val();
                console.log("Dados brutos:", dados); // VAI APARECER NO CONSOLE DO NAVEGADOR

                if (!dados) {
                    document.getElementById('status').innerText = '❌ Nenhum dado encontrado no caminho "inscricoes"';
                    return;
                }

                let lista = [];
                if (Array.isArray(dados)) {
                    lista = dados.filter(Boolean);
                } else {
                    lista = Object.values(dados).filter(Boolean);
                }

                document.getElementById('qtd').innerText = lista.length + ' cadastros';
                document.getElementById('status').innerText = '✅ Dados carregados com sucesso!';

                // MOSTRA OS NOMES NA TELA
                let html = '<h3>📋 Lista de nomes:</h3><ul>';
                lista.forEach(item => {
                    html += `<li>${item.nome || 'Sem nome'}</li>`;
                });
                html += '</ul>';
                document.getElementById('lista').innerHTML = html;

            })
            .catch(erro => {
                document.getElementById('status').className = 'erro';
                document.getElementById('status').innerText = '❌ ERRO: ' + erro.message;
                console.error("Erro detalhado:", erro);
            });

        } catch (erro) {
            document.getElementById('status').className = 'erro';
            document.getElementById('status').innerText = '❌ ERRO AO INICIAR: ' + erro.message;
        }
    </script>

</body>
</html>
